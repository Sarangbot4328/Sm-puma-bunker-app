<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SM PUMA 벙커 계산 프로그램</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="panel input-panel">
          <div class="title-row">
            <div>
              <p class="eyebrow">SM PUMA bunker calculator</p>
              <h1>SM PUMA 벙커 계산 프로그램</h1>
            </div>
            <span id="apiStatus" class="status">오프라인</span>
          </div>

          <form id="calcForm" class="form-grid">
            <label>
              탱크
              <select id="tankSelect" name="tank_id"></select>
            </label>

            <div class="segmented" role="radiogroup" aria-label="measurement type">
              <label>
                <input type="radio" name="measurement_type" value="sounding" checked />
                <span>사운딩</span>
              </label>
              <label>
                <input type="radio" name="measurement_type" value="ullage" />
                <span>얼레이지</span>
              </label>
            </div>

            <label>
              입력값 cm
              <input id="measurement" name="measurement_cm" type="number" min="0" step="0.1" value="100" required />
            </label>

            <label>
              트림 m
              <span class="signed-input">
                <input id="trim" name="trim_m" type="text" inputmode="decimal" pattern="-?[0-9]*[.]?[0-9]*" value="0" required />
                <button class="sign-toggle" type="button" data-target="trim">+/-</button>
              </span>
            </label>

            <label>
              힐링 deg
              <span class="signed-input">
                <input id="heel" name="heel_deg" type="text" inputmode="decimal" pattern="-?[0-9]*[.]?[0-9]*" value="0" required />
                <button class="sign-toggle" type="button" data-target="heel">+/-</button>
              </span>
            </label>

            <label>
              온도 °C
              <input id="temperature" name="temperature_c" type="number" step="0.1" value="15" />
            </label>

            <label>
              비중
              <input id="density" name="density" type="number" min="0" step="0.001" value="0.98" />
            </label>

            <button type="submit">계산</button>
          </form>

          <p id="rangeHelp" class="help"></p>
          <p class="creator">제작자: 윤형국</p>
          <p id="errorBox" class="error" hidden></p>
          <div id="totalSummary" class="total-summary" hidden></div>
        </div>

        <div class="panel result-panel">
          <p class="eyebrow">Result</p>
          <div class="primary-result">
            <span>Corrected Volume</span>
            <strong id="correctedVolumeResult">-</strong>
            <small>m3</small>
          </div>
          <div class="secondary-result">
            <span>Weight</span>
            <strong id="weightResult">-</strong>
            <small>M/T</small>
          </div>
          <dl class="details">
            <div>
              <dt>표 용적</dt>
              <dd id="volumeResult">-</dd>
            </div>
            <div>
              <dt>VCF</dt>
              <dd id="temperatureVcf">-</dd>
            </div>
            <div>
              <dt>원 사운딩</dt>
              <dd id="rawSound">-</dd>
            </div>
            <div>
              <dt>힐링 보정</dt>
              <dd id="heelCorrection">-</dd>
            </div>
            <div>
              <dt>보정 사운딩</dt>
              <dd id="correctedSound">-</dd>
            </div>
          </dl>
        </div>
      </section>
    </main>
    <script src="calculator.js"></script>
    <script src="app.js"></script>
  </body>
</html>
